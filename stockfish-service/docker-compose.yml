version: "3.9"

services:
  stockfish:
    build: .
    container_name: stockfish-service
    ports:
      - "8080:8080"
    environment:
      - STOCKFISH_PATH=stockfish
      - STOCKFISH_DEPTH=18
      - STOCKFISH_THREADS=2
      - STOCKFISH_HASH=64
      - PORT=8080
    restart: unless-stopped
    # 可选：限制 CPU/内存
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 512M

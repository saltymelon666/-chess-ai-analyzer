[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:stockfish]
command=uvicorn stockfish-service.api:app --host 0.0.0.0 --port 8080
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/stockfish.log
stderr_logfile=/var/log/supervisor/stockfish-error.log
environment=STOCKFISH_PATH="stockfish",STOCKFISH_DEPTH="18",STOCKFISH_THREADS="2",STOCKFISH_HASH="64",PORT="8080"

[program:frontend]
command=uvicorn app.api:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/frontend.log
stderr_logfile=/var/log/supervisor/frontend-error.log
environment=DEEPSEEK_API_KEY="%(ENV_DEEPSEEK_API_KEY)s",DEEPSEEK_BASE_URL="%(ENV_DEEPSEEK_BASE_URL)s",DEEPSEEK_MODEL="%(ENV_DEEPSEEK_MODEL)s",BACKEND_PORT="8000",STOCKFISH_SERVICE_URL="http://127.0.0.1:8080"

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 国际象棋分析助手</title>
  <meta name="description" content="粘贴 PGN，在浏览器里直接用 Stockfish 16 分析局面。完全免费，无需服务器。">
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='56' font-size='56'>♟</text></svg>">
  <script src="stockfish.js"></script>
  <style>
    :root {
      --bg: #111827;
      --panel: #182030;
      --panel-2: #202a3a;
      --line: #334155;
      --text: #f8fafc;
      --muted: #9ca3af;
      --accent: #d7a85b;
      --accent-2: #4f8f82;
      --danger: #ef4444;
      --ok: #86efac;
      --board-size: min(76vw, 580px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 14% 8%, rgba(215,168,91,0.18), transparent 28%),
                  linear-gradient(145deg, #0f172a, #111827 52%, #1a130d);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }
    .shell { max-width: 1260px; margin: 0 auto; padding: 20px; }
    .topbar { display: flex; justify-content: space-between; align-items: end; gap: 18px; margin-bottom: 16px; }
    h1 { margin: 0; font-size: clamp(26px, 4vw, 40px); }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .pill {
      border: 1px solid rgba(215,168,91,0.38); color: #ffe6b9;
      background: rgba(215,168,91,0.12); border-radius: 999px;
      padding: 8px 12px; font-size: 13px; white-space: nowrap;
    }
    .workspace { display: grid; grid-template-columns: minmax(370px, 620px) minmax(350px, 1fr); gap: 18px; align-items: start; }
    .panel {
      background: rgba(24,32,48,0.94); border: 1px solid rgba(148,163,184,0.22);
      border-radius: 8px; padding: 18px; box-shadow: 0 18px 45px rgba(0,0,0,0.28);
    }
    .board-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; color: var(--muted); font-size: 14px; }
    .board-shell {
      position: relative; width: var(--board-size); max-width: 100%;
      aspect-ratio: 1; margin: 0 auto;
      background-image: url("assets/chess/physical_chess_board_empty.png");
      background-size: cover; background-position: center;
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 28px 58px rgba(0,0,0,0.44);
    }
    .piece-img {
      position: absolute; width: calc(100% * 215 / 2048); height: calc(100% * 215 / 2048);
      object-fit: contain; transform: translate(-50%,-50%);
      filter: drop-shadow(0 8px 7px rgba(0,0,0,0.36));
      user-select: none; -webkit-user-drag: none;
      pointer-events: none;
    }
    .last-move {
      position: absolute; width: calc(100% * 215 / 2048); height: calc(100% * 215 / 2048);
      transform: translate(-50%,-50%); border: 3px solid rgba(79,143,130,0.9);
      background: rgba(79,143,130,0.18); border-radius: 4px; pointer-events: none;
    }
    .game-strip {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px;
      margin-top: 14px; align-items: center; text-align: center; color: var(--muted);
    }
    .player { background: rgba(15,23,42,0.72); border: 1px solid var(--line); border-radius: 8px; padding: 11px; min-width: 0; }
    .player strong { display: block; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .controls { display: grid; gap: 12px; }
    button {
      border: 0; border-radius: 7px; color: var(--text); font-weight: 700;
      cursor: pointer; padding: 10px 13px; transition: transform 120ms ease, opacity 120ms ease;
      font-family: inherit;
    }
    .primary-btn { background: var(--accent-2); }
    .secondary-btn { background: #475569; }
    .ghost-btn { background: rgba(255,255,255,0.07); color: #dbe2ea; font-size: 13px; font-weight: 600; }
    .icon-btn { background: #0f172a; border: 1px solid var(--line); min-width: 44px; }
    button:hover { opacity: 0.92; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    select, input, textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 7px;
      background: #0f172a; color: var(--text); padding: 10px 11px; font: inherit; outline: none;
    }
    textarea { min-height: 120px; resize: vertical; font-family: Consolas, monospace; line-height: 1.5; }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }

    .pgn-summary {
      display: none; background: rgba(15,23,42,0.7); border: 1px solid var(--line);
      border-radius: 8px; padding: 12px; gap: 8px;
    }
    .pgn-summary.active { display: grid; }
    .summary-row { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 13px; }
    .summary-row strong { color: var(--text); }

    .timeline { display: none; gap: 10px; background: rgba(15,23,42,0.5); border: 1px solid rgba(148,163,184,0.18); border-radius: 8px; padding: 12px; }
    .timeline.active { display: grid; }
    .step-controls { display: grid; grid-template-columns: auto auto 1fr auto auto; gap: 8px; align-items: center; }
    .move-preview { display: grid; gap: 7px; max-height: 132px; overflow: auto; padding-right: 4px; }
    .move-chip {
      border: 1px solid var(--line); background: rgba(255,255,255,0.045); color: #dbe2ea;
      border-radius: 6px; padding: 7px 9px; text-align: left; cursor: pointer; font-size: 13px;
    }
    .move-chip.active { border-color: var(--accent); background: rgba(215,168,91,0.16); color: #ffe6b9; }

    .results { display: none; gap: 12px; }
    .results.active { display: grid; }
    .metric {
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
      background: linear-gradient(135deg, rgba(79,143,130,0.24), rgba(215,168,91,0.18));
      border: 1px solid rgba(215,168,91,0.22); border-radius: 8px; padding: 14px;
    }
    .metric strong { font-size: 27px; }
    .muted, .move-pv, .small { color: var(--muted); font-size: 13px; }
    .move-card { background: #0f172a; border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-top: 9px; }
    .move-line { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .move-san { font-weight: 800; font-size: 18px; color: #ffe6b9; }
    .loading, .error { display: none; padding: 12px; border-radius: 8px; }
    .loading { background: rgba(79,143,130,0.16); color: #c7f3ea; }
    .error { background: rgba(239,68,68,0.16); color: #fecaca; }
    pre { overflow: auto; background: #0f172a; border: 1px solid var(--line); border-radius: 8px; padding: 12px; max-height: 300px; }

    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; }
      .topbar { align-items: start; flex-direction: column; }
    }
    @media (max-width: 600px) {
      .shell { padding: 14px; }
      .step-controls { grid-template-columns: 1fr; }
      .game-strip { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<main class="shell">
  <div class="topbar">
    <div>
      <h1>AI 国际象棋分析助手</h1>
      <p class="subtitle">粘贴 PGN，浏览器内直接用 Stockfish 分析 · 完全免费 · 无需服务器</p>
    </div>
    <div class="pill">本地引擎 · 离线可用</div>
  </div>

  <section class="workspace">
    <section class="panel">
      <div class="board-head">
        <span id="positionLabel">初始局面</span>
        <span id="turnLabel">白方走棋</span>
      </div>
      <div class="board-shell" id="visualBoard"></div>
      <div class="game-strip">
        <div class="player"><span>白方</span><strong id="whiteName">White</strong></div>
        <div class="muted" id="gameMeta">初始局面</div>
        <div class="player"><span>黑方</span><strong id="blackName">Black</strong></div>
      </div>
    </section>

    <section class="panel controls">
      <label for="sourceInput">粘贴 PGN</label>
      <textarea id="sourceInput" spellcheck="false" placeholder="从 chess.com 或 lichess 复制 PGN 粘贴到这里。例如：1. e4 e5 2. Nf3 Nc6 3. Bc4 Nf6"></textarea>

      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="primary-btn" id="importBtn" onclick="importPgn()">导入并显示</button>
        <button class="secondary-btn" onclick="clearAll()">清空</button>
        <button class="ghost-btn" onclick="loadExample('italian')">意大利开局</button>
        <button class="ghost-btn" onclick="loadExample('scholars')">四步杀</button>
      </div>

      <div class="pgn-summary" id="pgnSummary">
        <div class="summary-row"><span>已导入</span><strong id="summaryTitle">PGN 棋谱</strong></div>
        <div class="summary-row"><span>总步数</span><strong id="summaryMoves">0</strong></div>
        <div class="summary-row"><span>当前局面</span><strong id="summaryStep">初始局面</strong></div>
      </div>

      <div class="timeline" id="timeline">
        <div class="step-controls">
          <button class="icon-btn" onclick="jumpStep(0)">|&lt;</button>
          <button class="icon-btn" onclick="jumpStep(currentStep - 1)">&lt;</button>
          <input type="range" id="pgnStep" min="0" max="0" value="0" oninput="onSliderInput()">
          <button class="icon-btn" onclick="jumpStep(currentStep + 1)">&gt;</button>
          <button class="icon-btn" onclick="jumpStep(totalSteps)">&gt;|</button>
        </div>
        <div class="summary-row"><span id="stepLabel">初始局面</span><strong id="moveLabel">开局前</strong></div>
        <div class="move-preview" id="movePreview"></div>
      </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="primary-btn" id="analyzeBtn" onclick="analyze()" disabled>分析当前局面</button>
        <label style="display:flex;align-items:center;gap:8px;margin:0;color:var(--muted);font-size:13px;">
          <input type="checkbox" id="autoAnalyze" style="width:auto;"> 调步后自动分析
        </label>
      </div>

      <div class="loading" id="loading" style="display:none;">Stockfish 引擎加载中，请稍等...</div>
      <div class="error" id="errorBox"></div>

      <div class="results" id="resultSection">
        <div class="metric">
          <div>
            <span class="muted">局面评估</span>
            <strong id="evalValue">-</strong>
          </div>
          <span id="evalMeta" class="muted"></span>
        </div>
        <div>
          <h2 style="font-size:18px;margin:8px 0 0;">最佳着法</h2>
          <div id="movesList"></div>
        </div>
        <details>
          <summary>原始分析数据</summary>
          <pre id="rawJson"></pre>
        </details>
      </div>
    </section>
  </section>
</main>

<!-- chess.js v0.10.2 (本地版，已添加全局 Chess 变量) -->
<script src="chess.js"></script>

<script>
// ========== 状态管理 ==========
const FILES = ["a","b","c","d","e","f","g","h"];
const PIECE_ASSET = {
  P: "assets/chess/pieces_transparent/white_pawn_a2.png",
  N: "assets/chess/pieces_transparent/white_knight_b1.png",
  B: "assets/chess/pieces_transparent/white_bishop_c1.png",
  R: "assets/chess/pieces_transparent/white_rook_a1.png",
  Q: "assets/chess/pieces_transparent/white_queen_d1.png",
  K: "assets/chess/pieces_transparent/white_king_e1.png",
  p: "assets/chess/pieces_transparent/black_pawn_a7.png",
  n: "assets/chess/pieces_transparent/black_knight_b8.png",
  b: "assets/chess/pieces_transparent/black_bishop_c8.png",
  r: "assets/chess/pieces_transparent/black_rook_a8.png",
  q: "assets/chess/pieces_transparent/black_queen_d8.png",
  k: "assets/chess/pieces_transparent/black_king_e8.png"
};
const EXAMPLES = {
  italian: "1. e4 e5 2. Nf3 Nc6 3. Bc4 Nf6 4. d3 Be7 5. O-O O-O 6. Re1 d6",
  scholars: "1. e4 e5 2. Qh5 Nc6 3. Bc4 Nf6 4. Qxf7#"
};

let game = new Chess();
let moves = []; // 每步后的 fen
let currentStep = 0;
let totalSteps = 0;
let pgnHeaders = {};
let engine = null; // Stockfish WASM instance
let engineReady = false;
let engineQueue = [];
let engineResolve = null;
let analyzing = false;


// ========== Stockfish JS 引擎 ==========

let engineOutput = ""; // 累积引擎输出
let engineResolveCallback = null;

function initEngine() {
  return new Promise((resolve, reject) => {
    // stockfish.js 已通过 <script src> 在 head 中同步加载
    // window.Stockfish 已由 stockfish.js 末尾的修改设置为 t() 的返回值 (Promise)
    console.log("[SF] Stockfish type:", typeof Stockfish);
    
    if (typeof Stockfish === "undefined") {
      reject(new Error("Stockfish 未加载，请检查 stockfish.js 文件"));
      return;
    }
    
    const sfPromise = Stockfish; // Stockfish 就是 Promise
    const timeoutId = setTimeout(() => {
      console.error("[SF] TIMEOUT: 引擎初始化超过30秒");
      reject(new Error("引擎初始化超时"));
    }, 30000);
    
    sfPromise.then(sf => {
      clearTimeout(timeoutId);
      console.log("[SF] engine ready!");
      engine = sf;
      sf.listener = (msg) => {
        engineOutput += msg + "\n";
        if (msg === "readyok") {
          console.log("[SF] got readyok");
          engineReady = true;
          document.getElementById("analyzeBtn").disabled = false;
          document.getElementById("loading").style.display = "none";
          if (engineResolve) { engineResolve(); engineResolve = null; }
          if (engineQueue.length > 0) {
            const next = engineQueue.shift();
            sendToEngine(next.fen, next.resolve);
          }
        }
        if (msg.startsWith("bestmove")) {
          if (engineResolveCallback) {
            const out = engineOutput;
            engineOutput = "";
            engineResolveCallback(out);
            engineResolveCallback = null;
          }
          analyzing = false;
          if (engineQueue.length > 0) {
            const next = engineQueue.shift();
            sendToEngine(next.fen, next.resolve);
          }
        }
      };
      sf.processCommand("uci");
      sf.processCommand("setoption name Hash value 64");
      sf.processCommand("setoption name MultiPV value 3");
      sf.processCommand("isready");
      engineResolve = resolve;
    }).catch(e => {
      clearTimeout(timeoutId);
      console.error("[SF] init failed:", e);
      reject(e);
    });
  });
}

function sendToEngine(fen, resolve) {
  engineOutput = "";
  engineResolveCallback = resolve;
  engine.processCommand("ucinewgame");
  engine.processCommand(`position fen ${fen}`);
  engine.processCommand("go depth 16");
}

function analyzeWithEngine(fen) {
  return new Promise((resolve) => {
    if (!engineReady) {
      engineQueue.push({ fen, resolve });
      return;
    }
    if (analyzing) {
      engineQueue.push({ fen, resolve });
      return;
    }
    analyzing = true;
    sendToEngine(fen, resolve);
  });
}

function parseEngineOutput(output) {
  const lines = output.split("\n");
  const result = { top_moves: [], depth: 0, nodes: 0, time_ms: 0 };
  let currentDepth = 0;
  const pvMap = {};

  for (const line of lines) {
    if (line.startsWith("info")) {
      const depthMatch = line.match(/depth (\d+)/);
      const scoreMatch = line.match(/score (cp|mate) (-?\d+)/);
      const multipvMatch = line.match(/multipv (\d+)/);
      const pvMatch = line.match(/ pv (.+)/);
      const nodesMatch = line.match(/nodes (\d+)/);
      const timeMatch = line.match(/time (\d+)/);

      if (depthMatch) currentDepth = parseInt(depthMatch[1]);
      if (nodesMatch) result.nodes = parseInt(nodesMatch[1]);
      if (timeMatch) result.time_ms = parseInt(timeMatch[1]);
      result.depth = Math.max(result.depth, currentDepth);

      const mpv = multipvMatch ? parseInt(multipvMatch[1]) : 1;

      if (pvMatch && scoreMatch) {
        const pvMoves = pvMatch[1].trim().split(/\s+/);
        const san = pvMoves.length > 0 ? uciToSan(pvMoves[0]) : "";
        const mateIn = scoreMatch[1] === "mate" ? parseInt(scoreMatch[2]) : null;
        const centipawn = scoreMatch[1] === "cp" ? parseInt(scoreMatch[2]) : null;

        pvMap[mpv] = {
          move: pvMoves[0] || "",
          san: san,
          centipawn: centipawn,
          mate_in: mateIn,
          score: centipawn != null ? centipawn / 100 : null,
          pv: pvMoves.slice(1).map(uciToSan),
          depth: currentDepth
        };
      }
    }
  }

  // 排序 multipv
  result.top_moves = Object.values(pvMap).sort((a, b) => {
    if (a.mate_in != null && b.mate_in != null) {
      const aVal = a.mate_in > 0 ? 9999 - a.mate_in : -9999 + a.mate_in;
      const bVal = b.mate_in > 0 ? 9999 - b.mate_in : -9999 + b.mate_in;
      return bVal - aVal;
    }
    if (a.mate_in != null) return -1;
    if (b.mate_in != null) return 1;
    return (b.centipawn || 0) - (a.centipawn || 0);
  });

  // 评估文本
  if (result.top_moves.length > 0) {
    const best = result.top_moves[0];
    if (best.mate_in != null) {
      result.evaluation = best.mate_in > 0 ? `白方 M${best.mate_in}` : `黑方 M${Math.abs(best.mate_in)}`;
    } else if (best.centipawn != null) {
      const s = best.centipawn / 100;
      result.evaluation = s >= 0 ? `+${s.toFixed(1)}` : s.toFixed(1);
    }
  }

  return result;
}

function uciToSan(uci) {
  if (!uci || uci.length < 4) return uci;
  try {
    const tempGame = new Chess(game.fen());
    const move = tempGame.move({ from: uci.slice(0,2), to: uci.slice(2,4), promotion: uci[4] || undefined });
    return move ? move.san : uci;
  } catch {
    return uci;
  }
}

// ========== PGN 导入 ==========
// 存储每步的 SAN 和 FEN
let pgnMoves = []; // {san: "e4", fen: "..."}

function parsePgn(raw) {
  const clean = raw.trim();
  const tempGame = new Chess();
  tempGame.load_pgn(clean, { sloppy: true });
  pgnHeaders = tempGame.header();

  // 收集所有走法
  const history = tempGame.history({ verbose: true });

  // 重置，逐步记录 fen
  const replay = new Chess();
  pgnMoves = [];
  moves = [replay.fen()]; // 初始局面
  for (const m of history) {
    replay.move(m.san);
    pgnMoves.push({ san: m.san, fen: replay.fen() });
    moves.push(replay.fen());
  }
  totalSteps = history.length;
  currentStep = totalSteps;

  // 最终 game 状态设为终局
  game = new Chess();
  game.load_pgn(clean, { sloppy: true });

  return history;
}

function importPgn() {
  const raw = document.getElementById("sourceInput").value.trim();
  if (!raw) return showError("请先粘贴 PGN");
  clearError();

  try {
    parsePgn(raw);
  } catch (e) {
    showError("无法解析 PGN：" + e.message);
    return;
  }

  document.getElementById("pgnStep").max = totalSteps;
  document.getElementById("pgnStep").value = currentStep;
  document.getElementById("timeline").classList.add("active");
  document.getElementById("pgnSummary").classList.add("active");
  document.getElementById("summaryTitle").textContent = pgnHeaders.Event || "PGN 棋谱";
  document.getElementById("summaryMoves").textContent = `${totalSteps} 个半回合`;
  document.getElementById("whiteName").textContent = pgnHeaders.White || "White";
  document.getElementById("blackName").textContent = pgnHeaders.Black || "Black";
  document.getElementById("gameMeta").textContent = [pgnHeaders.Event, pgnHeaders.Date, pgnHeaders.Result].filter(Boolean).join(" · ") || "PGN 棋谱";
  updateStepLabels();
  renderBoard();
  renderMovePreview();
  document.getElementById("resultSection").classList.remove("active");
}

function updateStepLabels() {
  const label = currentStep === 0 ? "初始局面" : currentStep >= totalSteps ? "终局" : `第 ${currentStep} 个半回合后`;
  document.getElementById("stepLabel").textContent = label;
  document.getElementById("summaryStep").textContent = label;
  const sanLabel = currentStep === 0 ? "开局前" : (pgnMoves[currentStep - 1] ? pgnMoves[currentStep - 1].san : "");
  document.getElementById("moveLabel").textContent = sanLabel;
}

function renderMovePreview() {
  const box = document.getElementById("movePreview");
  box.innerHTML = pgnMoves.map((m, i) => {
    const moveNum = i + 1;
    const active = currentStep === moveNum;
    return `<button class="move-chip ${active ? 'active' : ''}" onclick="jumpStep(${moveNum})">${m.san}</button>`;
  }).join("");
}

function onSliderInput() {
  currentStep = Number(document.getElementById("pgnStep").value);
  rebuildGameAtStep(currentStep);
  updateStepLabels();
  renderBoard();
  renderMovePreview();
  if (document.getElementById("autoAnalyze").checked) analyze();
}

function jumpStep(step) {
  currentStep = Math.max(0, Math.min(step, totalSteps));
  document.getElementById("pgnStep").value = currentStep;
  rebuildGameAtStep(currentStep);
  updateStepLabels();
  renderBoard();
  renderMovePreview();
  document.getElementById("resultSection").classList.remove("active");
  if (document.getElementById("autoAnalyze").checked) analyze();
}

function rebuildGameAtStep(step) {
  if (step === 0) {
    game = new Chess();
    return;
  }
  game = new Chess();
  const movesToReplay = pgnMoves.slice(0, step);
  for (const m of movesToReplay) {
    game.move(m.san);
  }
}

function clearAll() {
  document.getElementById("sourceInput").value = "";
  game = new Chess();
  moves = [game.fen()];
  pgnMoves = [];
  currentStep = 0;
  totalSteps = 0;
  pgnHeaders = {};
  document.getElementById("timeline").classList.remove("active");
  document.getElementById("pgnSummary").classList.remove("active");
  document.getElementById("resultSection").classList.remove("active");
  document.getElementById("whiteName").textContent = "White";
  document.getElementById("blackName").textContent = "Black";
  document.getElementById("gameMeta").textContent = "初始局面";
  document.getElementById("movePreview").innerHTML = "";
  renderBoard();
  clearError();
}

function loadExample(name) {
  document.getElementById("sourceInput").value = EXAMPLES[name];
  importPgn();
}

// ========== 分析 ==========
async function analyze() {
  if (!engineReady) {
    showError("引擎还在加载中，请稍等...");
    return;
  }
  clearError();
  document.getElementById("analyzeBtn").disabled = true;
  document.getElementById("analyzeBtn").textContent = "分析中...";

  try {
    const fen = game.fen();
    const output = await analyzeWithEngine(fen);
    const parsed = parseEngineOutput(output);
    showResult(parsed);
  } catch (e) {
    showError("分析出错：" + e.message);
  } finally {
    document.getElementById("analyzeBtn").disabled = false;
    document.getElementById("analyzeBtn").textContent = "分析当前局面";
  }
}

function showResult(engineData) {
  document.getElementById("resultSection").classList.add("active");
  renderBoard();

  const topMoves = engineData.top_moves || [];
  const best = topMoves[0];

  let evalText = engineData.evaluation || "-";
  let evalDetail = "";
  if (best) {
    if (best.mate_in != null) {
      evalDetail = `将杀在 ${Math.abs(best.mate_in)} 步`;
    } else if (best.score != null) {
      const s = best.score;
      if (Math.abs(s) > 1.5) evalDetail = `优势 ${s > 0 ? '+' : ''}${s.toFixed(1)}`;
      else if (Math.abs(s) > 0.5) evalDetail = `略优 ${s > 0 ? '+' : ''}${s.toFixed(1)}`;
      else evalDetail = `均势 ${s >= 0 ? '+' : ''}${s.toFixed(1)}`;
    }
  }
  document.getElementById("evalValue").textContent = evalText;
  document.getElementById("evalMeta").textContent = evalDetail;
  document.getElementById("movesList").innerHTML = topMoves.map((m, i) => {
    let scoreStr = "";
    if (m.mate_in != null) {
      scoreStr = m.mate_in > 0 ? `白方 M${m.mate_in}` : `黑方 M${Math.abs(m.mate_in)}`;
    } else {
      const s = m.score;
      scoreStr = s != null ? (s > 0 ? `+${s.toFixed(1)}` : `${s.toFixed(1)}`) : "-";
    }
    return `<div class="move-card">
      <div class="move-line">
        <div><span class="small">#${i + 1}</span> <span class="move-san">${m.san}</span></div>
        <strong>${scoreStr}</strong>
      </div>
      <div class="move-pv">${(m.pv || []).slice(0, 6).join(" → ") || "-"}</div>
    </div>`;
  }).join("");
  document.getElementById("rawJson").textContent = JSON.stringify(engineData, null, 2);
}

// ========== 棋盘渲染 ==========
const BOARD_META = { size: 2048, margin: 164, square: 215 };

function boardCenter(row, col, flipped) {
  const file = flipped ? 7 - col : col;
  const rank = flipped ? row : 7 - row;
  const x = BOARD_META.margin + file * BOARD_META.square + BOARD_META.square / 2;
  const y = BOARD_META.margin + rank * BOARD_META.square + BOARD_META.square / 2;
  return { left: `${x / BOARD_META.size * 100}%`, top: `${y / BOARD_META.size * 100}%` };
}

function parseFen(fen) {
  const parts = fen.trim().split(/\s+/);
  const ranks = parts[0].split("/");
  const turn = parts[1] || "w";
  const pieces = [];
  ranks.forEach((rank, row) => {
    let col = 0;
    for (const ch of rank) {
      if (/\d/.test(ch)) col += Number(ch);
      else {
        pieces.push({ piece: ch, row, col, square: `${FILES[col]}${8 - row}` });
        col += 1;
      }
    }
  });
  return { pieces, turn };
}

function renderBoard() {
  const board = document.getElementById("visualBoard");
  board.innerHTML = "";
  const fen = game.fen();
  const { pieces, turn } = parseFen(fen);
  const flipped = turn === "b";
  document.getElementById("turnLabel").textContent = turn === "b" ? "黑方走棋" : "白方走棋";
  document.getElementById("positionLabel").textContent = `${pieces.length} 枚棋子 · ${flipped ? "黑方视角" : "白方视角"}`;

  pieces.forEach((entry) => {
    const img = document.createElement("img");
    img.className = "piece-img";
    img.src = PIECE_ASSET[entry.piece];
    img.alt = entry.square;
    Object.assign(img.style, boardCenter(entry.row, entry.col, flipped));
    board.appendChild(img);
  });
}

// ========== 辅助函数 ==========
function clearError() { document.getElementById("errorBox").style.display = "none"; }
function showError(msg) {
  const box = document.getElementById("errorBox");
  box.textContent = msg;
  box.style.display = "block";
}

// ========== 初始化 ==========
document.addEventListener("DOMContentLoaded", () => {
  renderBoard();
  document.getElementById("loading").style.display = "block";
  document.getElementById("analyzeBtn").disabled = true;

  initEngine().then(() => {
    console.log("Stockfish WASM ready!");
  }).catch(err => {
    showError("引擎加载失败：" + err.message + "。请刷新页面重试。");
    document.getElementById("loading").style.display = "none";
  });

  document.getElementById("sourceInput").addEventListener("paste", () => {
    setTimeout(() => {
      if (document.getElementById("sourceInput").value.trim()) importPgn();
    }, 100);
  });
});
</script>

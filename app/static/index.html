<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AI 国际象棋分析助手</title>
  <meta name="description" content="粘贴 chess.com 或 lichess PGN，逐步查看局面并调用 Stockfish 分析。">
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='56' font-size='56'>♟</text></svg>">
  <style>
    :root {
      --bg: #111827;
      --panel: #182030;
      --panel-2: #202a3a;
      --line: #334155;
      --text: #f8fafc;
      --muted: #9ca3af;
      --accent: #d7a85b;
      --accent-2: #4f8f82;
      --danger: #ef4444;
      --ok: #86efac;
      --board-size: min(76vw, 640px);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 8%, rgba(215,168,91,0.18), transparent 28%),
        linear-gradient(145deg, #0f172a, #111827 52%, #1a130d);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    .shell { max-width: 1320px; margin: 0 auto; padding: 22px; }
    .topbar { display: flex; justify-content: space-between; align-items: end; gap: 18px; margin-bottom: 16px; }
    h1 { margin: 0; font-size: clamp(28px, 4vw, 46px); letter-spacing: 0; }
    .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 15px; }
    .pill {
      border: 1px solid rgba(215,168,91,0.38);
      color: #ffe6b9;
      background: rgba(215,168,91,0.12);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 13px;
      white-space: nowrap;
    }

    .workspace { display: grid; grid-template-columns: minmax(390px, 690px) minmax(360px, 1fr); gap: 18px; align-items: start; }
    .panel {
      background: rgba(24, 32, 48, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.28);
    }

    .board-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; color: var(--muted); font-size: 14px; }
    .board-shell {
      position: relative;
      width: var(--board-size);
      max-width: 100%;
      aspect-ratio: 1;
      margin: 0 auto;
      background-image: url("/assets/chess/physical_chess_board_empty.png");
      background-size: cover;
      background-position: center;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 28px 58px rgba(0,0,0,0.44);
      touch-action: none;
    }
    .piece-img {
      position: absolute;
      width: calc(100% * 215 / 2048);
      height: calc(100% * 215 / 2048);
      object-fit: contain;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 8px 7px rgba(0,0,0,0.36));
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 120ms ease, filter 120ms ease;
    }
    .piece-img.draggable { cursor: grab; }
    .piece-img.draggable:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.08); filter: drop-shadow(0 14px 10px rgba(0,0,0,0.42)); z-index: 20; }
    .last-move {
      position: absolute;
      width: calc(100% * 215 / 2048);
      height: calc(100% * 215 / 2048);
      transform: translate(-50%, -50%);
      border: 3px solid rgba(79, 143, 130, 0.9);
      background: rgba(79, 143, 130, 0.18);
      border-radius: 4px;
      pointer-events: none;
    }
    .best-from {
      border: 3px solid rgba(255, 200, 80, 0.9);
      background: rgba(255, 200, 80, 0.22);
    }
    .best-to {
      border: 3px solid rgba(255, 180, 60, 0.9);
      background: rgba(255, 180, 60, 0.22);
    }
    .board-shell.flipped .piece-img,
    .board-shell.flipped .last-move { transform: translate(-50%, -50%) rotate(180deg); }


    .game-strip {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
      text-align: center;
      color: var(--muted);
    }
    .player {
      background: rgba(15,23,42,0.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      min-width: 0;
    }
    .player strong { display: block; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .controls { display: grid; gap: 12px; }
    .tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .tab-btn, .ghost-btn, .primary-btn, .secondary-btn, .icon-btn {
      border: 0;
      border-radius: 7px;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      padding: 10px 13px;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }
    .tab-btn { background: rgba(255,255,255,0.07); color: #dbe2ea; }
    .tab-btn.active { background: var(--accent-2); color: white; }
    .primary-btn { background: var(--accent-2); }
    .secondary-btn { background: #475569; }
    .ghost-btn { background: rgba(255,255,255,0.07); color: #dbe2ea; font-size: 13px; font-weight: 600; }
    .icon-btn { background: #0f172a; border: 1px solid var(--line); min-width: 44px; }
    button:hover { opacity: 0.92; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    select, input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0f172a;
      color: var(--text);
      padding: 10px 11px;
      font: inherit;
      outline: none;
    }
    textarea { min-height: 132px; resize: vertical; font-family: Consolas, "Cascadia Mono", monospace; line-height: 1.55; }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .paste-actions, .analysis-actions, .examples { display: flex; gap: 8px; flex-wrap: wrap; }
    .hint { display: none; color: var(--ok); font-size: 13px; line-height: 1.5; }

    .pgn-summary {
      display: none;
      background: rgba(15,23,42,0.7);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      gap: 8px;
    }
    .pgn-summary.active { display: grid; }
    .summary-row { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 13px; }
    .summary-row strong { color: var(--text); }

    .timeline {
      display: none;
      gap: 10px;
      background: rgba(15,23,42,0.5);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 8px;
      padding: 12px;
    }
    .timeline.active { display: grid; }
    .step-controls { display: grid; grid-template-columns: auto auto 1fr auto auto; gap: 8px; align-items: center; }
    .move-preview {
      display: grid;
      gap: 7px;
      max-height: 132px;
      overflow: auto;
      padding-right: 4px;
    }
    .move-chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.045);
      color: #dbe2ea;
      border-radius: 6px;
      padding: 7px 9px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
    }
    .move-chip.active { border-color: var(--accent); background: rgba(215,168,91,0.16); color: #ffe6b9; }

    .results { display: none; gap: 12px; }
    .results.active { display: grid; }
    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      background: linear-gradient(135deg, rgba(79,143,130,0.24), rgba(215,168,91,0.18));
      border: 1px solid rgba(215,168,91,0.22);
      border-radius: 8px;
      padding: 14px;
    }
    .metric strong { font-size: 27px; }
    .muted, .move-pv, .small { color: var(--muted); font-size: 13px; }
    .move-card { background: #0f172a; border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-top: 9px; }
    .move-line { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .move-san { font-weight: 800; font-size: 18px; color: #ffe6b9; }
    .explain-box { border-left: 4px solid var(--accent); background: rgba(15, 23, 42, 0.72); border-radius: 7px; padding: 12px; line-height: 1.65; }
    .explain-box strong { display: block; margin-bottom: 5px; }
    .explain-box p { margin: 0; color: #d5dce7; }
    .loading, .error { display: none; padding: 12px; border-radius: 8px; }
    .loading { background: rgba(79,143,130,0.16); color: #c7f3ea; }
    .error { background: rgba(239,68,68,0.16); color: #fecaca; }
    details { color: var(--muted); }
    pre { overflow: auto; background: #0f172a; border: 1px solid var(--line); border-radius: 8px; padding: 12px; max-height: 340px; }

    @media (max-width: 980px) {
      .workspace { grid-template-columns: 1fr; }
      .topbar { align-items: start; flex-direction: column; }
    }
    @media (max-width: 620px) {
      .shell { padding: 14px; }
      .field-grid, .step-controls { grid-template-columns: 1fr; }
      .game-strip { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div>
        <h1>AI 国际象棋分析助手</h1>
        <p class="subtitle">粘贴 chess.com / lichess PGN 后，直接看棋盘、调步数、分析当前局面。</p>
      </div>
      <div class="pill">PGN 不再占屏幕 · 每一步都能单独分析</div>
    </div>

    <section class="workspace">
      <section class="panel">
        <div class="board-head">
          <span id="positionLabel">初始局面</span>
          <span id="turnLabel">白方走棋</span>
        </div>
        <div class="board-shell" id="visualBoard" aria-label="国际象棋棋盘"></div>
        <div class="game-strip">
          <div class="player"><span>白方</span><strong id="whiteName">White</strong></div>
          <div class="muted" id="gameMeta">新局面</div>
          <div class="player"><span>黑方</span><strong id="blackName">Black</strong></div>
        </div>
      </section>

      <section class="panel controls">
        <div class="tabs">
          <button class="tab-btn active" id="pgnTab" onclick="setMode('pgn')">粘贴 PGN</button>
          <button class="tab-btn" id="fenTab" onclick="setMode('fen')">输入 FEN</button>
        </div>

        <div class="field-grid">
          <div>
            <label for="language">解释语言</label>
            <select id="language">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <div>
            <label for="stockfishUrl">Stockfish 服务</label>
            <input type="text" id="stockfishUrl" value="" placeholder="留空使用当前地址">
          </div>
          <div>
            <label for="aiUrl">AI 解释服务 (可选)</label>
            <input type="text" id="aiUrl" value="" placeholder="留空使用当前地址">
          </div>
        </div>

        <div id="pastePanel">
          <label for="sourceInput" id="sourceLabel">PGN 原文</label>
          <textarea id="sourceInput" spellcheck="false" placeholder="从 chess.com 或 lichess 复制 PGN 后，粘贴到这里。支持带 [Event] 标签的完整 PGN，也支持只有着法的文本，例如：1. e4 e5 2. Nf3 Nc6"></textarea>
          <div class="paste-actions" style="margin-top:8px;">
            <button class="primary-btn" onclick="importPosition()">导入并显示棋盘</button>
            <button class="secondary-btn" onclick="clearInput()">清空</button>
          </div>
        </div>

        <div class="pgn-summary" id="pgnSummary">
          <div class="summary-row"><span>已导入</span><strong id="summaryTitle">PGN 棋谱</strong></div>
          <div class="summary-row"><span>总步数</span><strong id="summaryMoves">0</strong></div>
          <div class="summary-row"><span>当前局面</span><strong id="summaryStep">初始局面</strong></div>
          <button class="ghost-btn" onclick="showRawInput()">查看/修改 PGN 原文</button>
        </div>

        <div class="timeline" id="timeline">
          <div class="step-controls">
            <button class="icon-btn" onclick="jumpStep(0)">|&lt;</button>
            <button class="icon-btn" onclick="jumpStep(app.step - 1)">&lt;</button>
            <input type="range" id="pgnStep" min="0" max="0" value="0" oninput="onTimelineInput()" onchange="onTimelineCommit()">
            <button class="icon-btn" onclick="jumpStep(app.step + 1)">&gt;</button>
            <button class="icon-btn" onclick="jumpStep(app.totalSteps)">&gt;|</button>
          </div>
          <div class="summary-row"><span id="pgnStepLabel">初始局面</span><strong id="currentMoveLabel">开局前</strong></div>
          <div class="move-preview" id="movePreview"></div>
        </div>

        <div class="examples">
          <button class="ghost-btn" onclick="loadExample('pgn_italian')">示例：意大利开局</button>
          <button class="ghost-btn" onclick="loadExample('pgn_scholars')">示例：四步杀</button>
          <button class="ghost-btn" onclick="loadExample('fen_start')">示例：初始 FEN</button>
        </div>

        <div class="analysis-actions">
          <button class="primary-btn" id="analyzeBtn" onclick="analyzeCurrent(true)">分析当前局面</button>
          <button class="secondary-btn" id="engineBtn" onclick="analyzeCurrent(false)">仅 Stockfish</button>
          <label style="display:flex;align-items:center;gap:8px;margin:0;color:var(--muted);">
            <input type="checkbox" id="autoAnalyze" style="width:auto;"> 调步后自动分析
          </label>
        </div>

        <div class="hint" id="formatHint"></div>
        <div class="loading" id="loading">正在处理，请稍等...</div>
        <div class="error" id="errorBox"></div>

        <div class="results" id="resultSection">
          <div class="metric">
            <div>
              <span class="muted">局面评估</span>
              <strong id="evalValue">-</strong>
            </div>
            <span id="evalMeta" class="muted"></span>
          </div>

          <div>
            <h2 style="font-size:20px;margin:8px 0 0;">最佳着法</h2>
            <div id="movesList"></div>
          </div>

          <div id="aiExplanation" style="display:none; gap:10px;">
            <h2 style="font-size:20px;margin:8px 0 0;">AI 解读</h2>
            <div class="explain-box"><strong>局面总结</strong><p id="aiSummary"></p></div>
            <div class="explain-box"><strong>战略分析</strong><p id="aiStrategy"></p></div>
            <div class="explain-box"><strong>最佳着法推理</strong><p id="aiReasoning"></p></div>
            <div class="explain-box"><strong>计划建议</strong><p id="aiPlan"></p></div>
            <div id="aiTactical"></div>
            <div id="aiIdeas"></div>
          </div>

          <details>
            <summary>原始分析数据</summary>
            <pre id="rawJson"></pre>
          </details>
        </div>
      </section>
    </section>
  </main>

  <script>
    const FILES = ["a","b","c","d","e","f","g","h"];
    // 棋子图片素材映射（来自 C:/Users/LENOVO/Desktop/ChessGameAssets）
    const PIECE_ASSET = {
      P: "/assets/chess/pieces_transparent/white_pawn_a2.png",
      N: "/assets/chess/pieces_transparent/white_knight_b1.png",
      B: "/assets/chess/pieces_transparent/white_bishop_c1.png",
      R: "/assets/chess/pieces_transparent/white_rook_a1.png",
      Q: "/assets/chess/pieces_transparent/white_queen_d1.png",
      K: "/assets/chess/pieces_transparent/white_king_e1.png",
      p: "/assets/chess/pieces_transparent/black_pawn_a7.png",
      n: "/assets/chess/pieces_transparent/black_knight_b8.png",
      b: "/assets/chess/pieces_transparent/black_bishop_c8.png",
      r: "/assets/chess/pieces_transparent/black_rook_a8.png",
      q: "/assets/chess/pieces_transparent/black_queen_d8.png",
      k: "/assets/chess/pieces_transparent/black_king_e8.png"
    };
    const EXAMPLES = {
      pgn_italian: `[Event "Live Chess"]\n[Site "Chess.com"]\n[Date "2026.07.06"]\n[White "Player1"]\n[Black "Player2"]\n[Result "*"]\n\n1. e4 e5 2. Nf3 Nc6 3. Bc4 Nf6 4. d3 Be7 5. O-O O-O 6. Re1 d6`,
      pgn_scholars: `1. e4 e5 2. Qh5 Nc6 3. Bc4 Nf6 4. Qxf7#`,
      fen_start: `rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1`
    };
    const app = {
      mode: "pgn",
      raw: "",
      currentFen: EXAMPLES.fen_start,
      step: 0,
      totalSteps: 0,
      pgnInfo: null,
      lastBestMove: null,
      previewTimer: null,
      analyzeTimer: null
    };
    const SF_URL = () => {
      const val = document.getElementById("stockfishUrl").value.trim().replace(/\/$/, "");
      return val || window.location.origin;
    };
    const AI_URL = () => {
      const val = document.getElementById("aiUrl").value.trim().replace(/\/$/, "");
      return val || window.location.origin;
    };

    function setMode(mode) {
      app.mode = mode;
      document.getElementById("pgnTab").classList.toggle("active", mode === "pgn");
      document.getElementById("fenTab").classList.toggle("active", mode === "fen");
      document.getElementById("sourceLabel").textContent = mode === "pgn" ? "PGN 原文" : "FEN 局面";
      document.getElementById("sourceInput").placeholder = mode === "pgn"
        ? "从 chess.com 或 lichess 复制 PGN 后，粘贴到这里。支持完整 PGN，也支持只有着法的文本。"
        : "粘贴 FEN，例如：rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
      document.getElementById("timeline").classList.toggle("active", mode === "pgn" && app.totalSteps > 0);
      document.getElementById("pgnSummary").classList.toggle("active", mode === "pgn" && !!app.pgnInfo);
      showRawInput();
    }

    function clearInput() {
      document.getElementById("sourceInput").value = "";
      document.getElementById("pgnSummary").classList.remove("active");
      document.getElementById("timeline").classList.remove("active");
      setHint("");
    }

    function showRawInput() {
      document.getElementById("pastePanel").style.display = "block";
    }

    function hideRawInputForPgn() {
      if (app.mode === "pgn" && app.pgnInfo) document.getElementById("pastePanel").style.display = "none";
    }

    function loadExample(name) {
      if (name === "fen_start") setMode("fen");
      else setMode("pgn");
      document.getElementById("sourceInput").value = EXAMPLES[name];
      importPosition();
    }

    async function importPosition() {
      const raw = document.getElementById("sourceInput").value.trim();
      if (!raw) return showError("请先粘贴 PGN 或 FEN。");
      app.raw = raw;
      clearError();
      setLoading("正在解析棋谱...");
      try {
        if (app.mode === "fen") {
          app.currentFen = raw;
          app.pgnInfo = null;
          app.totalSteps = 0;
          app.step = 0;
          renderBoard(raw);
          document.getElementById("timeline").classList.remove("active");
          document.getElementById("pgnSummary").classList.remove("active");
          updateGameMeta(null);
          setHint("FEN 已显示为棋盘，可以直接分析当前局面。");
        } else {
          const data = await fetchPosition(-1);
          applyPositionPreview(data, true);
          hideRawInputForPgn();
          setHint("PGN 已导入。现在可以拖动步数条查看每一步，或分析当前局面。");
        }
      } catch (error) {
        showError(error.message);
      } finally {
        hideLoading();
      }
    }

    async function fetchPosition(step) {
      const body = app.mode === "pgn"
        ? { pgn: app.raw, pgn_step: step }
        : { fen: app.raw };
      const resp = await fetch(`${SF_URL()}/api/position`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
      return data;
    }

    function applyPositionPreview(data, fromImport = false) {
      app.currentFen = data.fen;
      app.pgnInfo = data.pgn_info || null;
      if (app.pgnInfo) {
        app.totalSteps = app.pgnInfo.total_moves || 0;
        app.step = app.pgnInfo.current_step ?? app.totalSteps;
        document.getElementById("pgnStep").max = app.totalSteps;
        document.getElementById("pgnStep").value = app.step;
        document.getElementById("timeline").classList.add("active");
        document.getElementById("pgnSummary").classList.add("active");
        updatePgnSummary();
        renderMovePreview();
      }
      renderBoard(app.currentFen, app.lastBestMove);
      if (fromImport) updateGameMeta(app.pgnInfo);
      updateStepLabels();
    }

    function updatePgnSummary() {
      const info = app.pgnInfo;
      if (!info) return;
      const title = info.event || info.site || "PGN 棋谱";
      document.getElementById("summaryTitle").textContent = title;
      document.getElementById("summaryMoves").textContent = `${info.total_moves || 0} 个半回合`;
      document.getElementById("whiteName").textContent = info.white || "White";
      document.getElementById("blackName").textContent = info.black || "Black";
      updateGameMeta(info);
    }

    function updateGameMeta(info) {
      if (!info) {
        document.getElementById("whiteName").textContent = "White";
        document.getElementById("blackName").textContent = "Black";
        document.getElementById("gameMeta").textContent = "自定义局面";
        return;
      }
      const bits = [info.event, info.date, info.result].filter(Boolean);
      document.getElementById("gameMeta").textContent = bits.join(" · ") || "PGN 棋谱";
    }

    function updateStepLabels() {
      const label = app.step === 0 ? "初始局面" : app.step >= app.totalSteps ? "终局" : `第 ${app.step} 个半回合后`;
      document.getElementById("pgnStepLabel").textContent = label;
      document.getElementById("summaryStep").textContent = label;
      const moves = app.pgnInfo?.moves_san || [];
      document.getElementById("currentMoveLabel").textContent = app.step === 0 ? "开局前" : moves[Math.ceil(app.step / 2) - 1] || "";
    }

    function renderMovePreview() {
      const box = document.getElementById("movePreview");
      const moves = app.pgnInfo?.moves_san || [];
      box.innerHTML = moves.map((move, index) => {
        const whitePly = index * 2 + 1;
        const blackPly = index * 2 + 2;
        const active = app.step === whitePly || app.step === blackPly || (app.step >= app.totalSteps && index === moves.length - 1);
        return `<button class="move-chip ${active ? "active" : ""}" onclick="jumpStep(${Math.min(blackPly, app.totalSteps)})">${move}</button>`;
      }).join("");
    }

    function onTimelineInput() {
      app.step = Number(document.getElementById("pgnStep").value);
      updateStepLabels();
      window.clearTimeout(app.previewTimer);
      app.previewTimer = window.setTimeout(() => previewStep(app.step), 150);
    }

    function onTimelineCommit() {
      if (document.getElementById("autoAnalyze").checked) {
        window.clearTimeout(app.analyzeTimer);
        app.analyzeTimer = window.setTimeout(() => analyzeCurrent(false), 260);
      }
    }

    function jumpStep(step) {
      if (!app.pgnInfo) return;
      app.step = Math.max(0, Math.min(step, app.totalSteps));
      document.getElementById("pgnStep").value = app.step;
      previewStep(app.step).then(() => {
        if (document.getElementById("autoAnalyze").checked) analyzeCurrent(false);
      });
    }

    async function previewStep(step) {
      if (app.mode !== "pgn" || !app.raw) return;
      clearError();
      try {
        const data = await fetchPosition(step);
        app.lastBestMove = null;
        applyPositionPreview(data);
      } catch (error) {
        showError(error.message);
      }
    }

    function buildEngineBody() {
      if (app.mode === "pgn") {
        return {
          pgn: app.raw || document.getElementById("sourceInput").value.trim(),
          pgn_step: app.step >= app.totalSteps ? -1 : app.step,
        };
      }
      return {
        fen: app.currentFen || document.getElementById("sourceInput").value.trim(),
      };
    }

    function buildAiBody(engineData) {
      return {
        fen: engineData.fen,
        engine: engineData,
        board_info: engineData.board_info,
        language: document.getElementById("language").value,
      };
    }

    async function analyzeCurrent(withAi) {
      clearError();
      setLoading(withAi ? "正在进行完整分析..." : "正在调用 Stockfish...");
      try {
        if (app.mode === "pgn" && !app.pgnInfo) await importPosition();
        if (app.mode === "fen") app.currentFen = document.getElementById("sourceInput").value.trim() || app.currentFen;

        // Step 1: 调用 Stockfish 微服务
        const sfResp = await fetch(`${SF_URL()}/api/analyze`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(buildEngineBody())
        });
        const engineData = await sfResp.json();
        if (!sfResp.ok) throw new Error(engineData.detail || `Stockfish HTTP ${sfResp.status}`);

        // Step 2: 可选 — 调用 AI 解释服务
        let aiExplanation = null;
        if (withAi) {
          const aiUrl = AI_URL();
          if (aiUrl) {
            setLoading("正在获取 AI 解读...");
            try {
              const aiResp = await fetch(`${aiUrl}/api/explain`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(buildAiBody(engineData))
              });
              if (aiResp.ok) {
                aiExplanation = await aiResp.json();
              }
            } catch (e) {
              console.warn("AI 解释服务不可用:", e.message);
            }
          }
        }

        showResult(engineData, aiExplanation);
      } catch (error) {
        showError(error.message);
      } finally {
        hideLoading();
      }
    }

    const BOARD_META = { size: 2048, margin: 164, square: 215 };

    function parseFen(fen) {
      const parts = fen.trim().split(/\s+/);
      const ranks = parts[0].split("/");
      const turn = parts[1] || "w";
      if (ranks.length !== 8) throw new Error("FEN 棋盘部分应包含 8 行。");
      const pieces = [];
      ranks.forEach((rank, row) => {
        let col = 0;
        for (const ch of rank) {
          if (/\d/.test(ch)) col += Number(ch);
          else {
            if (!PIECE_ASSET[ch]) throw new Error(`无法识别棋子：${ch}`);
            pieces.push({ piece: ch, row, col, square: `${FILES[col]}${8 - row}` });
            col += 1;
          }
        }
      });
      return { pieces, turn };
    }

    function boardCenter(row, col, flipped) {
      const file = flipped ? 7 - col : col;
      const rank = flipped ? 7 - row : row;
      const x = BOARD_META.margin + file * BOARD_META.square + BOARD_META.square / 2;
      const y = BOARD_META.margin + rank * BOARD_META.square + BOARD_META.square / 2;
      return { left: `${x / BOARD_META.size * 100}%`, top: `${y / BOARD_META.size * 100}%` };
    }

    function renderBoard(fen, bestMove) {
      const board = document.getElementById("visualBoard");
      board.innerHTML = "";
      const { pieces, turn } = parseFen(fen);
      const flipped = turn === "b";
      document.getElementById("turnLabel").textContent = turn === "b" ? "黑方走棋" : "白方走棋";
      document.getElementById("positionLabel").textContent = `${pieces.length} 枚棋子 · ${flipped ? "黑方视角" : "白方视角"}`;

      // 高亮最后一步着法
      if (bestMove && bestMove.length >= 4) {
        [bestMove.slice(0, 2), bestMove.slice(2, 4)].forEach(square => {
          const mark = document.createElement("div");
          mark.className = "last-move";
          Object.assign(mark.style, boardCenter(8 - Number(square[1]), FILES.indexOf(square[0]), flipped));
          board.appendChild(mark);
        });
      }

      // 逐个放置棋子图片
      pieces.forEach((entry, index) => {
        const img = document.createElement("img");
        img.className = "piece-img draggable";
        img.src = PIECE_ASSET[entry.piece];
        img.alt = entry.square;
        img.draggable = false;
        img.dataset.index = String(index);
        Object.assign(img.style, boardCenter(entry.row, entry.col, flipped));
        enablePieceDrag(img, board);
        board.appendChild(img);
      });
    }

    function enablePieceDrag(piece, board) {
      piece.addEventListener("pointerdown", event => {
        piece.setPointerCapture(event.pointerId);
        const rect = board.getBoundingClientRect();
        const move = e => {
          const x = Math.min(Math.max(e.clientX - rect.left, 0), rect.width);
          const y = Math.min(Math.max(e.clientY - rect.top, 0), rect.height);
          piece.style.left = `${x / rect.width * 100}%`;
          piece.style.top = `${y / rect.height * 100}%`;
        };
        const up = () => {
          piece.removeEventListener("pointermove", move);
          piece.removeEventListener("pointerup", up);
          piece.removeEventListener("pointercancel", up);
        };
        piece.addEventListener("pointermove", move);
        piece.addEventListener("pointerup", up);
        piece.addEventListener("pointercancel", up);
      });
    }

    function showResult(engineData, aiExplanation) {
      const engine = engineData.engine || engineData;
      app.currentFen = engine.fen;
      app.lastBestMove = engine.top_moves?.[0]?.move || engine.best_moves?.[0]?.move || null;
      if (engineData.pgn_info) {
        app.pgnInfo = engineData.pgn_info;
        app.step = app.pgnInfo.current_step ?? app.step;
        app.totalSteps = app.pgnInfo.total_moves || app.totalSteps;
        updatePgnSummary();
      }
      renderBoard(engine.fen, app.lastBestMove);
      document.getElementById("resultSection").classList.add("active");

      // 兼容新旧 API 格式
      const topMoves = engine.top_moves || engine.best_moves || [];
      const bestMove = topMoves[0];

      let evalText = engine.evaluation || "-";
      let evalDetail = "";
      if (bestMove) {
        if (bestMove.mate_in != null) {
          evalDetail = `将杀在 ${Math.abs(bestMove.mate_in)} 步`;
        } else {
          const score = bestMove.score ?? (bestMove.centipawn != null ? bestMove.centipawn / 100 : null);
          if (score != null) {
            const absScore = Math.abs(score);
            if (absScore > 1.5) evalDetail = `优势 ${score > 0 ? '+' : ''}${score.toFixed(1)}`;
            else if (absScore > 0.5) evalDetail = `略优 ${score > 0 ? '+' : ''}${score.toFixed(1)}`;
            else if (absScore > 0.2) evalDetail = `均势 ${score >= 0 ? '+' : ''}${score.toFixed(1)}`;
            else evalDetail = `均势 ${score >= 0 ? '+' : ''}${score.toFixed(1)}`;
          }
        }
      }
      document.getElementById("evalValue").textContent = evalText;
      document.getElementById("evalMeta").textContent = evalDetail;
      document.getElementById("movesList").innerHTML = topMoves.map((move, index) => {
        let scoreStr = "";
        if (move.mate_in != null) {
          scoreStr = move.mate_in > 0 ? `白方 M${move.mate_in}` : `黑方 M${Math.abs(move.mate_in)}`;
        } else {
          const s = move.score ?? (move.centipawn != null ? move.centipawn / 100 : null);
          scoreStr = s != null ? (s > 0 ? `+${s.toFixed(1)}` : `${s.toFixed(1)}`) : "-";
        }
        return `<div class="move-card">
          <div class="move-line">
            <div><span class="small">#${index + 1}</span> <span class="move-san">${move.san}</span></div>
            <strong>${scoreStr}</strong>
          </div>
          <div class="move-pv">${(move.pv || []).slice(0, 6).join(" → ") || "-"}</div>
        </div>`;
      }).join("");

      const ai = document.getElementById("aiExplanation");
      if (aiExplanation) {
        ai.style.display = "grid";
        document.getElementById("aiSummary").textContent = aiExplanation.summary || "";
        document.getElementById("aiStrategy").textContent = aiExplanation.strategic_analysis || "";
        document.getElementById("aiReasoning").textContent = aiExplanation.best_move_reasoning || "";
        document.getElementById("aiPlan").textContent = aiExplanation.plan_suggestion || "";
        document.getElementById("aiTactical").innerHTML = (aiExplanation.tactical_points || []).map(item => `<div class="explain-box"><strong>战术要点</strong><p>${item}</p></div>`).join("");
        document.getElementById("aiIdeas").innerHTML = (aiExplanation.key_ideas || []).map(item => `<div class="explain-box"><strong>关键思路</strong><p>${item}</p></div>`).join("");
      } else {
        ai.style.display = "none";
      }
      document.getElementById("rawJson").textContent = JSON.stringify(engineData, null, 2);
    }

    function setHint(text) {
      const el = document.getElementById("formatHint");
      el.textContent = text;
      el.style.display = text ? "block" : "none";
    }
    function clearError() { document.getElementById("errorBox").style.display = "none"; }
    function showError(message) {
      hideLoading();
      const box = document.getElementById("errorBox");
      box.textContent = message;
      box.style.display = "block";
    }
    function setLoading(message) {
      const el = document.getElementById("loading");
      el.textContent = message;
      el.style.display = "block";
      document.getElementById("analyzeBtn").disabled = true;
      document.getElementById("engineBtn").disabled = true;
    }
    function hideLoading() {
      document.getElementById("loading").style.display = "none";
      document.getElementById("analyzeBtn").disabled = false;
      document.getElementById("engineBtn").disabled = false;
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderBoard(EXAMPLES.fen_start);
      document.getElementById("sourceInput").addEventListener("paste", () => {
        window.setTimeout(() => {
          if (app.mode === "pgn" && document.getElementById("sourceInput").value.trim()) importPosition();
        }, 80);
      });
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
